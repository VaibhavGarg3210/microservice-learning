services:
 accountsdb:
  container_name: accountsdb
  ports:
   - 3306:3306
  environment:
   MYSQL_DATABASE: accountsdb
  extends:
   file: common-config.yml
   service: microservice-db-config

 loansdb:
    container_name: loansbb
    ports:
     - 3307:3306
    environment:
     MYSQL_DATABASE: loansdb
    extends:
     file: common-config.yml
     service: microservice-db-config 
   
 cardsdb:
  image: mysql
  container_name: cardsdb
  ports:
   - 3308:3306
  healthcheck:
   test: ["CMD","mysqladmin","ping","-h","localhost"]
   timeout: 10s
   retries: 10
   interval: 10s
   start_period: 10s
  environment:
   MYSQL_ROOT_PASSWORD: root
   MYSQL_DATABASE: cardsdb
  extends:
   file: common-config.yml
   service: network-deploy-service 
      
 configserver:
  image: "vaibhavg3210/configserver:s7"
  container_name: configserver-ms #if not define it automatic create
  ports:
   - "8071:8071"
  healthcheck:
   test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  extends:
   file: common-config.yml
   service: microservice-base-config
#  deploy:
#   resources:
#    limits:
#     memory: 700m #tell max size not exceed to 700mb
#  networks:
#   - vaibhavg1280
   
 accounts:
  image: "vaibhavg3210/accounts:s7"
  container_name: account-ms #if not define it automatic create
  ports:
   - "8080:8080"
  environment:
   SPRING_APPLICATION_NAME: "accounts"
   SPRING_DATASOURCE_URL: "jdbc:mysql://accountsdb:3306/accountsdb"
  depends_on:
   accountsdb:
    condition: service_healthy
  extends:
   file: common-config.yml
   service: microservice-configserver-config

 loans:
  image: "vaibhavg3210/loans:s7"
  container_name: loans-ms #if not define it automatic create
  ports:
   - "8090:8090"
  environment:
   SPRING_APPLICATION_NAME: "loans"
   SPRING_DATASOURCE_URL: "jdbc:mysql://loansdb:3306/loansdb"
  depends_on:
   loansdb:
    condition: service_healthy
  extends:
   file: common-config.yml
   service: microservice-configserver-config
  
 cards:
  image: "vaibhavg3210/cards:s7"
  container_name: cards-ms #if not define it automatic create
  ports:
   - "9000:9000"
  environment:
   SPRING_APPLICATION_NAME: "cards"
   SPRING_DATASOURCE_URL: "jdbc:mysql://cardsdb:3306/cardsdb"
  depends_on:
   cardsdb:
    condition: service_healthy
  extends:
   file: common-config.yml
   service: microservice-configserver-config
   
networks:
 vaibhavg1280:
  driver: "bridge"
  