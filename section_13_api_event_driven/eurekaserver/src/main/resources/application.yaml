spring:
 application:
  name: eurekaserver
 config:
  import: "optional:configserver:http://localhost:8071/"

management:
 endpoints:
  web:
   exposure:
    include: "*"
 health:
  readiness-state:
   enabled: true
   liveness-state:
    enabled: true
 endpoint:
  health:
   probes: 
    enabled: true
 metrics:  # define the matrics with microservices
  export:
   prometheus:
    enabled: true
  tags:
   application: ${spring.application.name}

