services:
 rabbit:
  image: rabbitmq:4.0-management
  hostname: rabbitmq
  ports:
        - "5672:5672"
        - "15672:15672"
  healthcheck:
        test: rabbitmq-diagnostics check_port_connectivity
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 5s
  extends:
        file: common-config.yml
        service: network-deploy-service 
  
 redis:
  image: redis
  ports:
   - "6379:6379"
  healthcheck:
   test: ["CMD-SHELL","redis-cli ping | grep PONG"]
   timeout: 10s
   retries: 10
  extends:
   file: common-config.yml
   service: network-deploy-service
 configserver:
  image: "vaibhavg3210/configserver:s10"
  container_name: configserver-ms #if not define it automatic create
  ports:
   - "8071:8071"
  healthcheck:
   test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  extends:
   file: common-config.yml
   service: microservice-base-config
#  deploy:
#   resources:
#    limits:
#     memory: 700m #tell max size not exceed to 700mb
#  networks:
#   - vaibhavg1280
 eurekaserver:
  image: "vaibhavg3210/eurekaserver:s10"
  container_name: eurekaserver-ms #if not define it automatic create
  ports:
   - "8070:8070"
  healthcheck:
   test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  extends:
   file: common-config.yml
   service: microservice-configserver-config
  environment:
    SPRING_APPLICATION_NAME: "eurekaserver"

 accounts:
  image: "vaibhavg3210/accounts:s10"
  container_name: account-ms #if not define it automatic create
  ports:
   - "8080:8080"
  healthcheck:
   test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  environment:
   SPRING_APPLICATION_NAME: "accounts"
  extends:
   file: common-config.yml
   service: microservice-eureka-config

 loans:
  image: "vaibhavg3210/loans:s10"
  container_name: loans-ms #if not define it automatic create
  ports:
   - "8090:8090"
  healthcheck:
   test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  environment:
   SPRING_APPLICATION_NAME: "loans"
  extends:
   file: common-config.yml
   service: microservice-eureka-config
  
 cards:
  image: "vaibhavg3210/cards:s10"
  container_name: cards-ms #if not define it automatic create
  ports:
   - "9000:9000"
  healthcheck:
   test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 10s #we use common_config
  environment:
   SPRING_APPLICATION_NAME: "cards"
  extends:
   file: common-config.yml
   service: microservice-eureka-config

 gatewayserver:
  image: "vaibhavg3210/gatewayserver:s10"
  container_name: gatewayserver-ms #if not define it automatic create
  ports:
   - "8072:8072"
  depends_on:
    accounts:
     condition: service_healthy
    loans:
     condition: service_healthy
    cards:
     condition: service_healthy
    redis:
     condition: service_healthy
  environment:
   SPRING_APPLICATION_NAME: "gatewayserver"
   SPRING_DATA_REDIS_CONNECT-TIMEOUT: 2s
   SPRING_DATA_REDIS_HOST: redis
   SPRING_DATA_REDIS_PORT: 6379
   SPRING_DATA_REDIS_TIMEOUT: 1s
  extends:
   file: common-config.yml
   service: microservice-eureka-config
   
networks:
 vaibhavg1280:
  driver: "bridge"
  